<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase History - Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='arcade.css') }}" />
  <style>
    .entry { display: grid; gap: 0.6rem; }
    .top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; }
    .items { display: grid; gap: 0.4rem; }
    .pill { font-size: 0.8rem; }
    .ds-processing { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); }
    .ds-out { background: rgba(234, 179, 8, 0.2); border: 1px solid rgba(234, 179, 8, 0.4); }
    .ds-delivered { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); }
    .pm-card { background: rgba(37, 99, 235, 0.2); border: 1px solid rgba(37, 99, 235, 0.4); }
    .pm-upi { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); }
    .pm-cod { background: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.4); }
    .pm-demo { background: rgba(148, 163, 184, 0.2); border: 1px solid rgba(148, 163, 184, 0.4); }
  </style>
</head>
<body>
  {% include 'partials/header.html' %}

  <main class="page-shell">
    <header class="page-header">
      <p class="badge">Order Log</p>
      <h1 class="page-title">Purchase History</h1>
      <p class="page-subtitle">Track delivery status and past orders.</p>
    </header>

    <section class="section-card">
      <div id="history" class="list"></div>
      <div id="empty" class="section-card" style="display:none; text-align:center;">No purchases yet.</div>
    </section>
  </main>

  <script>
    async function loadHistory(){
      try {
        const res = await fetch('/api/purchase/history');
        const data = await res.json();
        const list = document.getElementById('history');
        const empty = document.getElementById('empty');
        list.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';
        data.forEach(h => {
          const div = document.createElement('div');
          div.className = 'item entry';
          const date = new Date(h.date).toLocaleString();
          const total = Number(h.total || 0).toFixed(2);
          const buyer = h.buyer?.name || '';
          const email = h.buyer?.email || '';
          const pay = h.paymentMethod || 'Demo';
          const ds = deliveryBadge(h.deliveryStatus || h.delivery_status);
          div.innerHTML = `
            <div class="top">
              <div>
                <strong>Order #${h.id}</strong>
                <span class="pill">${date}</span>
                ${paymentBadge(pay)}
                ${ds}
              </div>
              <div><strong>INR ${total}</strong></div>
            </div>
            <div class="page-subtitle">${buyer} ${email ? '- ' + email : ''}</div>
            <div class="items">${(h.items||[]).map(it => `
              <div>${it.title} <span class="pill">${(it.item_type||'').toString().toUpperCase()}</span> <span class="pill">${it.action === 'rent' ? 'Rent' : 'Buy'}</span> x${it.quantity} - INR ${(Number(it.unit_price)*Number(it.quantity)).toFixed(2)}</div>
            `).join('')}</div>
          `;
          list.appendChild(div);
        });
      } catch (e) {
        alert('Failed to load history');
      }
    }
    function paymentBadge(method){
      const m = (method || 'Demo').toString().trim();
      const key = m.toLowerCase();
      let label = m || 'Demo';
      let cls = 'pm-demo';
      if (key === 'card') { cls = 'pm-card'; label = 'Card'; }
      else if (key === 'upi') { cls = 'pm-upi'; label = 'UPI'; }
      else if (key === 'cod' || key === 'cash on delivery') { cls = 'pm-cod'; label = 'COD'; }
      return `<span class="pill ${cls}">${label}</span>`;
    }
    function deliveryBadge(status){
      const s = (status||'Processing').trim().toLowerCase();
      let label = 'Processing', cls = 'ds-processing';
      if (s === 'out for delivery') { label = 'Out for delivery'; cls = 'ds-out'; }
      else if (s === 'delivered' || s === 'successful' || s === 'success') { label = 'Delivered'; cls = 'ds-delivered'; }
      return `<span class="pill ${cls}">${label}</span>`;
    }
    loadHistory();
  </script>
</body>
</html>
