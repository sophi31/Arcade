<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign up - Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='arcade.css') }}" />
  <style>
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
    .auth-card { width: 100%; max-width: 460px; background: rgba(8,12,20,0.9); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 2rem; box-shadow: var(--shadow); display:grid; gap:1rem; }
    .auth-card h2 { margin:0; }
    .auth-card label { display:grid; gap:.45rem; font-weight:700; color:var(--text); }
    .auth-card input { width:100%; min-height:44px; }
    .auth-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 0.2rem; gap: 0.8rem; flex-wrap: wrap; }
    .flash { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 0.7rem; margin: 0.8rem 0; color: var(--muted); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" method="post" action="{{ url_for('signup') }}">
      <p class="badge">New Explorer</p>
      <h2>Create account</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash">
            {% for cat,msg in messages %}<div>{{ msg }}</div>{% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <label>Username
        <input name="username" required autocomplete="username" />
      </label>

      <label>Email
        <input name="email" type="email" required autocomplete="email" />
      </label>

      <label>Password
        <input name="password" type="password" required autocomplete="new-password" />
      </label>

      <div class="auth-actions">
        <button type="submit" class="btn btn-primary">Sign up</button>
        <div class="page-subtitle">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
      </div>
    </form>
  </div>
</body>
</html>
