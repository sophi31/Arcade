<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe - Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='arcade.css') }}" />
  <style>
    .cafe-grid { display: grid; gap: 1.2rem; }
    .row { display:flex; gap:.6rem; align-items:center; flex-wrap: wrap; }
    .badge.ok { background: rgba(34,197,94,.2); border:1px solid rgba(34,197,94,.5); }
    .badge.members { background: rgba(245,158,11,.2); border:1px solid rgba(245,158,11,.5); }
    .badge.sold { background: rgba(239,68,68,.2); border:1px solid rgba(239,68,68,.5); }
  </style>
</head>
<body class="antialiased">
  {% include 'partials/header.html' %}

  <main class="page-shell">
    <header class="page-header">
      <p class="badge">Cafe & Lounge</p>
      <h1 class="page-title">Book a Session</h1>
      <p class="page-subtitle">Reserve tables, track bookings, and check daily availability.</p>
    </header>

    <section class="cafe-grid">
      <div class="section-card">
        <h2>Availability & Slots</h2>
        <p class="page-subtitle">Saturdays are members-only esports events. Sundays are closed.</p>
        <div class="row" style="margin-top: .8rem;">
          <label for="when">Date</label>
          <input id="when" type="date" />
          <button class="btn btn-primary" onclick="checkCafe()">Check</button>
          <button class="btn btn-ghost" onclick="loadSlots()">Load Slots</button>
        </div>
        <div id="status" class="page-subtitle" style="margin-top: .8rem;"></div>
        <div id="slots" class="page-subtitle" style="margin-top: .8rem;"></div>
      </div>

      <div class="section-card">
        <h2>Book a Slot</h2>
        <p class="page-subtitle">Choose time, party size, and duration.</p>
        <div class="row" style="margin-top: .8rem;">
          <label for="slot-time">Time</label>
          <select id="slot-time"></select>
          <label for="party">Party</label>
          <input id="party" type="number" min="1" max="10" value="1" style="width:80px" />
          <label for="duration">Duration</label>
          <select id="duration">
            <option value="60">60 min</option>
            <option value="90">90 min</option>
            <option value="120">120 min</option>
          </select>
        </div>
        <div class="row" style="margin-top: .8rem;">
          <label for="note">Note</label>
          <input id="note" type="text" placeholder="Optional note" />
          <button class="btn btn-accent" onclick="bookCafe()">Reserve</button>
        </div>
        <div id="book-msg" class="page-subtitle" style="margin-top: .8rem;"></div>
      </div>

      <div class="section-card">
        <h2>Your Bookings</h2>
        <div id="my-bookings" class="page-subtitle">Loading...</div>
      </div>
    </section>
  </main>

  <script>
    function fmt(d){
      const z = n => n.toString().padStart(2,'0');
      return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
    }
    function initDate(){
      const input = document.getElementById('when');
      if (input && !input.value) input.value = fmt(new Date());
    }
    async function checkCafe(){
      const input = document.getElementById('when');
      const out = document.getElementById('status');
      if (!input || !input.value) { out.textContent = 'Select a date first.'; return; }
      out.textContent = 'Checking...';
      try{
        const r = await fetch(`/api/cafe/availability?date=${encodeURIComponent(input.value)}`);
        const d = await r.json();
        if (!r.ok){ out.textContent = d.error || 'Error'; return; }
        let html = '';
        if (d.status === 'available') {
          html = `Available <span class="badge ok">All welcome</span>`;
        } else if (d.status === 'members_only') {
          html = `Members-only <span class="badge members">Esports day</span>`;
        } else if (d.status === 'sold_out') {
          html = `Fully booked <span class="badge sold">Closed</span>`;
        } else {
          html = d.note || 'Unknown status';
        }
        out.innerHTML = html;
      }catch(e){
        out.textContent = 'Failed to check availability.';
      }
    }
    async function loadSlots(){
      const date = document.getElementById('when')?.value;
      const out = document.getElementById('slots');
      const timeSel = document.getElementById('slot-time');
      if (!date){ out.textContent = 'Select a date first.'; return; }
      out.textContent = 'Loading slots...';
      timeSel.innerHTML = '';
      try {
        const r = await fetch(`/api/cafe/slots?date=${encodeURIComponent(date)}`);
        const d = await r.json();
        if (!r.ok){ out.textContent = d.error || 'Failed to load slots'; return; }
        if (d.closed){ out.textContent = 'Closed on this day.'; return; }
        if (d.members_only){ out.textContent = 'Members-only esports event day.'; return; }
        if (!d.slots || !d.slots.length){ out.textContent = 'No slots available.'; return; }
        out.innerHTML = `Capacity per slot: ${d.capacity}. Default duration: ${d.duration} minutes.`;
        d.slots.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.time; opt.textContent = `${s.time} - ${s.remaining} seats left`;
          timeSel.appendChild(opt);
        });
      } catch(e){
        out.textContent = 'Failed to load slots.';
      }
    }

    async function refreshMyBookings(){
      const box = document.getElementById('my-bookings');
      try{
        const r = await fetch('/api/cafe/bookings');
        const d = await r.json();
        if (!r.ok) { box.textContent = d.error || 'Failed to load'; return; }
        if (!d.length){ box.textContent = 'No bookings yet.'; return; }
        box.innerHTML = '';
        d.forEach(b => {
          const row = document.createElement('div');
          row.style.display = 'flex'; row.style.gap = '.5rem'; row.style.alignItems = 'center'; row.style.justifyContent = 'space-between';
          row.innerHTML = `<span>#${b.id} - ${b.date} ${b.time} - party ${b.party_size} - ${b.status}</span>`;
          if (b.status === 'confirmed'){
            const btn = document.createElement('button'); btn.textContent = 'Cancel'; btn.className = 'btn btn-ghost';
            btn.onclick = async ()=>{
              if (!confirm('Cancel this booking?')) return;
              const rr = await fetch(`/api/cafe/bookings/${b.id}`, { method:'DELETE' });
              const dd = await rr.json();
              if (!rr.ok){ alert(dd.error || 'Cancel failed'); return; }
              refreshMyBookings(); loadSlots();
            };
            row.appendChild(btn);
          }
          box.appendChild(row);
        });
      }catch(e){
        box.textContent = 'Failed to load';
      }
    }

    async function bookCafe(){
      const date = document.getElementById('when')?.value;
      const time = document.getElementById('slot-time')?.value;
      const party = Number(document.getElementById('party')?.value || '1');
      const duration = Number(document.getElementById('duration')?.value || '60');
      const note = document.getElementById('note')?.value || '';
      const out = document.getElementById('book-msg');
      if (!date || !time){ out.textContent = 'Please select date and time.'; return; }
      out.textContent = 'Submitting...';
      try{
        const r = await fetch('/api/cafe/book', {
          method: 'POST', headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ date, time, partySize: party, duration, note })
        });
        const d = await r.json();
        if (!r.ok){ out.textContent = (d.error || 'Booking failed') + (d.remaining !== undefined ? ` (remaining: ${d.remaining})` : ''); return; }
        out.textContent = `Booking confirmed (#${d.booking_id}) for ${date} at ${time}`;
        refreshMyBookings(); loadSlots();
      }catch(e){
        out.textContent = 'Booking error.';
      }
    }
    function init(){
      initDate();
      loadSlots();
      refreshMyBookings();
    }
    init();
  </script>
</body>
</html>
